<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place of my city</title>
    <meta name="description" content="This is my WDD 131 – Dynamic Web Fundamentals course website : Place of my city.">
    <meta name="author"  content="Mercy Mbungu">

    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css">

    <script src="scripts/place.js" defer></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Page title</h1>
        </header>
        <main>
            <picture>
                <source media="(min-width: 1000px)" srcset="images/template-kinshasa-large.webp">
                <source media="(min-width: 500px)" srcset="images/template-kinshasa-medium.webp">
                <img src="images/template-kinshasa-small.webp" alt="A beautiful landscape">
            </picture>
            <section class="card">
                <h2>Data</h2>
                <table>
                    <tr>
                        <th>Area:</th>
                        <td>1880 km²</td>
                    </tr>
                    <tr>
                        <th>Population:</th>
                        <td>12.5 million</td>
                    </tr>
                    <tr>
                        <th>Density:</th>
                        <td>6650 people/km²</td>
                    </tr>
                    <tr>
                        <th>Languages:</th>
                        <td>French, Lingala, Kikongo, Tshiluba</td>
                    </tr>
                    <tr>
                        <th>Currency:</th>
                        <td>Congolese franc</td>
                    </tr>
                    <tr>
                        <th>Timezone:</th>
                        <td>UTC+1 (West Africa Time)</td>
                    </tr>
                </table>
            </section>
            <section class="card">
                <h2>Weather</h2>
                <svg class="weather-icon" xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M7 8a3.5 3.5 0 0 1 3.5 3.555.5.5 0 0 0 .625.492A1.503 1.503 0 0 1 13 13.5a1.5 1.5 0 0 1-1.5 1.5H3a2 2 0 1 1 .1-3.998.5.5 0 0 0 .509-.375A3.5 3.5 0 0 1 7 8m4.473 3a4.5 4.5 0 0 0-8.72-.99A3 3 0 0 0 3 16h8.5a2.5 2.5 0 0 0 0-5z"/>
                    <path d="M11.286 1.778a.5.5 0 0 0-.565-.755 4.595 4.595 0 0 0-3.18 5.003 5.5 5.5 0 0 1 1.055.209A3.6 3.6 0 0 1 9.83 2.617a4.593 4.593 0 0 0 4.31 5.744 3.58 3.58 0 0 1-2.241.634q.244.477.394 1a4.59 4.59 0 0 0 3.624-2.04.5.5 0 0 0-.565-.755 3.593 3.593 0 0 1-4.065-5.422z"/>
                </svg>
                <table>
                    <tr>
                        <th>Temperature:</th>
                        <td><span id="temperature">20</span>°F</td>
                    </tr>
                    <tr>
                        <th>Conditions:</th>
                        <td><span id="humidity">50</span>%</td>
                    </tr>
                    <tr>
                        <th>Wind:</th>
                        <td><span id="windSpeed">5</span> mph</td>
                    </tr>
                    <tr>
                        <th>Wind Chill:</th>
                        <td><span id="windChill">N/A</span></td>
                    </tr>
                </table>
            </section>
        </main>
        <footer>
            <p>&copy; <span id="currentYear"></span> Mercy Mbungu, Kinshasa</p>
            <p id="lastModified"></p>
        </footer>
    </div>
</body>
</html>
